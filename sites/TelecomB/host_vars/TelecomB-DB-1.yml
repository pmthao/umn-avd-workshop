custom_structured_configuration_router_bgp:

  bgp:
    bestpath:
      d_path: True

  address_family_evpn:
    domain_identifier: "2:2"
    domain_identifier_remote: "1:1"
    route:
      import_match_failure_action: discard

    evpn_ethernet_segment:
      - domain: all
        identifier: 000b:bbbb:bbbb:1111:1111
        route_target_import: bb:bb:bb:11:11:11

  vrfs:
    - name: PROD
      rd: "evpn domain all 10.250.2.5:50001"
      route_targets:
        import:
          - address_family: evpn
            route_targets:
              - "domain all 50001:50001"
        export:
          - address_family: evpn
            route_targets:
              - "domain all 50001:50001"