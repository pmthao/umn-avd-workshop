!
no enable password
no aaa root
!
username arista privilege 15 role network-admin secret sha512 $6$arista$9fGjI7UzHgAVo9yYH8yyaxx7XjC.gGoOg1RBUK6CgAuCO8an3twI71Tvhq4H6aV6.Z6XyEzMaTjedWZ0eIF77/
username arista ssh-key ssh-rsa  arista@umn-2-1-ad5a6f69-eos
!
daemon TerminAttr
   exec /usr/bin/TerminAttr -cvaddr=192.168.0.5:9910 -cvauth=token,/tmp/token -cvvrf=default -disableaaa -smashexcludes=ale,flexCounter,hardware,kni,pulse,strata -taillogs -cvsourceintf=Management0
   no shutdown
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname AOC-DV-1
ip domain lookup source-interface Management0
ip name-server vrf default 192.168.0.1
dns domain atd.lab
!
spanning-tree mode mstp
no spanning-tree vlan-id 4093-4094
spanning-tree mst 0 priority 32768
!
vlan 10
   name Ten
!
vlan 20
   name Twenty
!
vlan 30
   name Thirty
!
vlan 40
   name Forty
!
vlan 3001
   name MLAG_L3_VRF_PROD
   trunk group MLAG
!
vlan 4093
   name MLAG_L3
   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
vrf instance PROD
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf default
      no shutdown
!
aaa authorization exec default local
!
interface Port-Channel1
   description MLAG_AOC-DV-2_Port-Channel1
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Port-Channel4
   description SERVER_AOC-HOST-1
   no shutdown
   switchport access vlan 10
   switchport mode access
   switchport
   mlag 4
   spanning-tree portfast
!
interface Ethernet1
   description MLAG_AOC-DV-2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description P2P_AOC-DS-1_Ethernet2
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.1.1/31
!
interface Ethernet3
   description P2P_AOC-DS-2_Ethernet2
   no shutdown
   mtu 1500
   no switchport
   ip address 172.16.1.3/31
!
interface Ethernet4
   description SERVER_AOC-HOST-1_eth1
   no shutdown
   channel-group 4 mode active
!
interface Ethernet6
   description MLAG_AOC-DV-2_Ethernet6
   no shutdown
   channel-group 1 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.250.1.3/32
!
interface Loopback1
   description VXLAN_TUNNEL_SOURCE
   no shutdown
   ip address 10.255.1.3/32
!
interface Management0
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.12/24
!
interface Vlan10
   description Ten
   no shutdown
   vrf PROD
   ip address virtual 10.10.10.1/24
!
interface Vlan20
   description Twenty
   no shutdown
   vrf PROD
   ip address virtual 10.20.20.1/24
!
interface Vlan30
   description Thirty
   no shutdown
   vrf PROD
   ip address virtual 10.30.30.1/24
!
interface Vlan40
   description Forty
   no shutdown
   vrf PROD
   ip address virtual 10.40.40.1/24
!
interface Vlan3001
   description MLAG_L3_VRF_PROD
   no shutdown
   mtu 1500
   vrf PROD
   ip address 10.252.1.0/31
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 1500
   ip address 10.252.1.0/31
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 10.251.1.0/31
!
interface Vxlan1
   description AOC-DV-1_VTEP
   vxlan source-interface Loopback1
   vxlan virtual-router encapsulation mac-address mlag-system-id
   vxlan udp-port 4789
   vxlan vlan 10 vni 10010
   vxlan vlan 20 vni 10020
   vxlan vlan 30 vni 10030
   vxlan vlan 40 vni 10040
   vxlan vrf PROD vni 50001
!
ip virtual-router mac-address 00:1c:73:00:00:99
!
ip routing
ip routing vrf PROD
!
ip prefix-list PL-LOOPBACKS-EVPN-OVERLAY
   seq 10 permit 10.250.1.0/24 eq 32
   seq 20 permit 10.255.1.0/24 eq 32
!
ip prefix-list PL-MLAG-PEER-VRFS
   seq 10 permit 10.252.1.0/31
!
mlag configuration
   domain-id S1_RACK1
   local-interface Vlan4094
   peer-address 10.251.1.1
   peer-link Port-Channel1
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ip route 0.0.0.0/0 192.168.0.1
!
ntp local-interface Management0
ntp server 192.168.0.1 prefer iburst
!
route-map RM-CONN-2-BGP permit 10
   match ip address prefix-list PL-LOOPBACKS-EVPN-OVERLAY
!
route-map RM-CONN-2-BGP-VRFS deny 10
   match ip address prefix-list PL-MLAG-PEER-VRFS
!
route-map RM-CONN-2-BGP-VRFS permit 20
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bfd
   multihop interval 300 min-rx 300 multiplier 3
!
router bgp 65101
   router-id 10.250.1.3
   no bgp default ipv4-unicast
   maximum-paths 4 ecmp 4
   neighbor EVPN-OVERLAY-PEERS peer group
   neighbor EVPN-OVERLAY-PEERS update-source Loopback0
   neighbor EVPN-OVERLAY-PEERS bfd
   neighbor EVPN-OVERLAY-PEERS ebgp-multihop 3
   neighbor EVPN-OVERLAY-PEERS password 7 Q4fqtbqcZ7oQuKfuWtNGRQ==
   neighbor EVPN-OVERLAY-PEERS send-community
   neighbor EVPN-OVERLAY-PEERS maximum-routes 0
   neighbor IPv4-UNDERLAY-PEERS peer group
   neighbor IPv4-UNDERLAY-PEERS password 7 7x4B4rnJhZB438m9+BrBfQ==
   neighbor IPv4-UNDERLAY-PEERS send-community
   neighbor IPv4-UNDERLAY-PEERS maximum-routes 12000
   neighbor MLAG-IPv4-UNDERLAY-PEER peer group
   neighbor MLAG-IPv4-UNDERLAY-PEER remote-as 65101
   neighbor MLAG-IPv4-UNDERLAY-PEER next-hop-self
   neighbor MLAG-IPv4-UNDERLAY-PEER description AOC-DV-2
   neighbor MLAG-IPv4-UNDERLAY-PEER route-map RM-MLAG-PEER-IN in
   neighbor MLAG-IPv4-UNDERLAY-PEER password 7 4b21pAdCvWeAqpcKDFMdWw==
   neighbor MLAG-IPv4-UNDERLAY-PEER send-community
   neighbor MLAG-IPv4-UNDERLAY-PEER maximum-routes 12000
   neighbor 10.250.1.1 peer group EVPN-OVERLAY-PEERS
   neighbor 10.250.1.1 remote-as 65100
   neighbor 10.250.1.1 description AOC-DS-1_Loopback0
   neighbor 10.250.1.2 peer group EVPN-OVERLAY-PEERS
   neighbor 10.250.1.2 remote-as 65100
   neighbor 10.250.1.2 description AOC-DS-2_Loopback0
   neighbor 10.252.1.1 peer group MLAG-IPv4-UNDERLAY-PEER
   neighbor 10.252.1.1 description AOC-DV-2_Vlan4093
   neighbor 172.16.1.0 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.1.0 remote-as 65100
   neighbor 172.16.1.0 description AOC-DS-1_Ethernet2
   neighbor 172.16.1.2 peer group IPv4-UNDERLAY-PEERS
   neighbor 172.16.1.2 remote-as 65100
   neighbor 172.16.1.2 description AOC-DS-2_Ethernet2
   redistribute connected route-map RM-CONN-2-BGP
   !
   vlan 10
      rd 10.250.1.3:10010
      route-target both 10010:10010
      redistribute learned
   !
   vlan 20
      rd 10.250.1.3:10020
      route-target both 10020:10020
      redistribute learned
   !
   vlan 30
      rd 10.250.1.3:10030
      route-target both 10030:10030
      redistribute learned
   !
   vlan 40
      rd 10.250.1.3:10040
      route-target both 10040:10040
      redistribute learned
   !
   address-family evpn
      neighbor EVPN-OVERLAY-PEERS activate
   !
   address-family ipv4
      no neighbor EVPN-OVERLAY-PEERS activate
      neighbor IPv4-UNDERLAY-PEERS activate
      neighbor MLAG-IPv4-UNDERLAY-PEER activate
   !
   vrf PROD
      rd 10.250.1.3:50001
      route-target import evpn 50001:50001
      route-target export evpn 50001:50001
      router-id 10.250.1.3
      neighbor 10.252.1.1 peer group MLAG-IPv4-UNDERLAY-PEER
      neighbor 10.252.1.1 description AOC-DV-2_Vlan3001
      redistribute connected route-map RM-CONN-2-BGP-VRFS
!
end
